      body {
        margin: 0;
        font-family: "Segoe UI", "Microsoft Yahei", sans-serif;
        background-color: #eef2f5;
        overflow: hidden;
      }
      .bg-frame,
      .bg-fallback {
        position: fixed;
        top: 0;
        left: 0;
        z-index: -1;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        filter: blur(12px) brightness(0.8);
      }
      .bg-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        background: rgba(0, 0, 0, 0.3);
      }
      .login-container {
        position: relative;
        max-width: 420px;
        margin: 120px auto;
        padding: 50px 40px;
        background: rgba(255, 255, 255, 0.96);
        border-radius: 10px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
        backdrop-filter: blur(5px);
      }
      .login-container h2 {
        text-align: center;
        margin-bottom: 25px;
        font-size: 24px;
        color: #222;
        font-weight: 500;
      }
      input {
        width: 100%;
        padding: 12px;
